<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Video Generation Daily Brief{% endblock %}</title>
    <style>
      :root {
        --bg: #f4f5ef;
        --surface: rgba(255, 255, 255, 0.88);
        --surface-strong: #ffffff;
        --border: rgba(21, 34, 56, 0.12);
        --text: #182235;
        --muted: #5f6c84;
        --accent: #0b5fff;
        --accent-soft: rgba(11, 95, 255, 0.12);
        --shadow: 0 18px 50px rgba(20, 35, 60, 0.10);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(11, 95, 255, 0.10), transparent 28%),
          linear-gradient(180deg, #fbfbf7 0%, #eef1e8 100%);
      }

      a {
        color: inherit;
      }

      .shell {
        max-width: 1160px;
        margin: 0 auto;
        padding: 28px 20px 56px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .brand {
        text-decoration: none;
      }

      .brand-mark {
        display: inline-flex;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .brand-title {
        display: block;
        margin-top: 10px;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .brand-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .auth-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .auth-meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .auth-label {
        color: var(--muted);
        font-size: 12px;
      }

      .auth-user {
        font-size: 14px;
        font-weight: 700;
      }

      .button,
      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        background: var(--text);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .button.secondary,
      button.secondary {
        background: var(--surface-strong);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .hero {
        padding: 28px;
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(11, 95, 255, 0.90), rgba(35, 145, 255, 0.75)),
          #0b5fff;
        color: #fff;
        box-shadow: var(--shadow);
      }

      .hero-grid {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 22px;
        align-items: end;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.84;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 14px 0 0;
        max-width: 58ch;
        line-height: 1.7;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .stat-card {
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
      }

      .stat-label {
        font-size: 12px;
        opacity: 0.78;
      }

      .stat-value {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 800;
      }

      .content-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.8fr) minmax(300px, 0.95fr);
        gap: 24px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 22px 24px 0;
      }

      .panel-title {
        margin: 0;
        font-size: 22px;
        font-weight: 800;
      }

      .panel-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .paper-list {
        display: grid;
        gap: 18px;
        padding: 20px 24px 24px;
      }

      .paper-card {
        padding: 20px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(20, 35, 60, 0.08);
      }

      .paper-card h2,
      .paper-card h3 {
        margin: 0;
        font-size: 23px;
        line-height: 1.3;
      }

      .paper-card h2 a,
      .paper-card h3 a {
        text-decoration: none;
      }

      .paper-card p {
        margin: 12px 0 0;
        line-height: 1.7;
      }

      .paper-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 7px 12px;
        border-radius: 999px;
        background: #eef3ff;
        color: #20458b;
        font-size: 13px;
        font-weight: 700;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
      }

      .inline-link {
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .sidebar {
        display: grid;
        gap: 18px;
      }

      .sidebar-block {
        padding: 22px;
      }

      .sidebar-block h3 {
        margin: 0;
        font-size: 18px;
      }

      .sidebar-block p,
      .sidebar-block li {
        color: var(--muted);
        line-height: 1.7;
      }

      .sidebar-block ul {
        margin: 14px 0 0;
        padding-left: 18px;
      }

      .article-shell {
        display: grid;
        gap: 22px;
      }

      .article-card {
        padding: 28px;
      }

      .article-card h1 {
        margin: 0;
        font-size: clamp(30px, 4vw, 44px);
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .article-card section {
        margin-top: 28px;
      }

      .article-card h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .article-card p,
      .article-card li {
        margin: 0;
        line-height: 1.85;
      }

      .article-card ul {
        margin: 12px 0 0;
        padding-left: 22px;
      }

      .login-wrap {
        min-height: calc(100vh - 84px);
        display: grid;
        place-items: center;
      }

      .login-card {
        width: min(100%, 460px);
        padding: 32px;
      }

      .login-card h1 {
        margin: 0;
        font-size: 32px;
      }

      .login-card p {
        color: var(--muted);
        line-height: 1.7;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .field label {
        font-size: 14px;
        font-weight: 700;
      }

      .field input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 13px 14px;
        font-size: 15px;
        background: #fff;
      }

      .error {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        background: #fff1f0;
        color: #9d2f24;
        font-size: 14px;
        font-weight: 700;
      }

      @media (max-width: 920px) {
        .topbar,
        .hero-grid,
        .content-grid {
          grid-template-columns: 1fr;
        }

        .auth-panel {
          justify-content: space-between;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      {% if current_user %}
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-mark">VG Daily</span>
          <span class="brand-title">Video Generation Daily Brief</span>
          <p class="brand-subtitle">每天追踪与 video generation 相关的热门论文，并整理为可读的中文日报。</p>
        </a>
        <div class="auth-panel">
          <div class="auth-meta">
            <span class="auth-label">当前已登录</span>
            <span class="auth-user">{{ current_user }}</span>
          </div>
          <form method="post" action="/logout">
            <button type="submit" class="secondary">退出登录</button>
          </form>
        </div>
      </header>
      {% endif %}
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
